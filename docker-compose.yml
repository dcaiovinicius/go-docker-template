version: "3.9"

services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    networks:
      - default

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    driver: bridge
